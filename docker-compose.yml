version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: tour_travel_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tour_travel_db
      MYSQL_USER: tour_user
      MYSQL_PASSWORD: tour_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
